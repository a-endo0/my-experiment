<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroop Task</title>
    
    <!-- jsPsych コアライブラリ -->
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <!-- 使用するプラグイン -->
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- jsPsych の基本スタイル -->
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />

    <style>
        body, .jspsych-display-element {
            background-color: #f9fafb;
            font-family: "Inter", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            color: #1f2937;
        }
        
        .instruction {
            font-size: 24px;
            line-height: 1.8;
            text-align: center;
        }
        
        .color-box {
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-right: 10px;
            vertical-align: middle;
            border: 2px solid #374151;
            border-radius: 4px;
        }
        
        .stimulus {
            font-size: 80px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        
        .fixation {
            font-size: 60px;
            color: #4b5563;
        }

        /* カスタム入力欄のスタイル */
        .jspsych-survey-text-question input[type="text"] {
            font-size: 18px;
            padding: 10px;
            border: 2px solid #d1d5db;
            border-radius: 8px;
            width: 300px;
            text-align: center;
        }

        .jspsych-survey-text-question input[type="text"]:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        .jspsych-btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .jspsych-btn:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>
    <script>
        const jsPsych = initJsPsych();
        const timeline = [];

        // 実行日時の取得 (JST)
        const timestamp = new Date().toLocaleString("ja-JP", {timeZone: "Asia/Tokyo"});
        let subject_id = ""; // 後で入力されたIDを格納する変数

        const enter_id = {
            type: jsPsychSurveyText,
            questions: [
                {
                    prompt: '<p class="text-2xl font-bold mb-4">参加者IDを入力してください</p><p class="text-gray-500 text-sm mb-6">（例：学籍番号やイニシャル）</p>', 
                    name: 'SubjectID', 
                    required: true
                }
            ],
            button_label: '次へ',
            on_finish: function(data) {
                // 入力されたIDを取得して変数に保存
                subject_id = data.response.SubjectID;
                
                // 以降のすべてのデータに共通のプロパティ（IDと日時）を自動追加
                jsPsych.data.addProperties({
                    subject_id: subject_id,
                    timestamp: timestamp
                });
            }
        };
        timeline.push(enter_id);

        const instructions = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `
                <div class="instruction p-8 bg-white rounded-xl shadow-lg border border-gray-200">
                    <p class="mb-6">画面に表示される文字の<br><strong class="text-3xl text-red-500 border-b-4 border-red-500 pb-1">『色』</strong><br>をキーボードで答えてください。</p>
                    <div class="bg-gray-50 p-6 rounded-lg text-left inline-block mb-6 border border-gray-200">
                        <p class="flex items-center mb-2"><span class="color-box bg-red-500"></span>赤色なら <strong class="ml-2 text-xl bg-gray-200 px-3 py-1 rounded">r</strong> キー</p>
                        <p class="flex items-center mb-2"><span class="color-box bg-blue-500"></span>青色なら <strong class="ml-2 text-xl bg-gray-200 px-3 py-1 rounded">b</strong> キー</p>
                        <p class="flex items-center"><span class="color-box bg-green-500"></span>緑色なら <strong class="ml-2 text-xl bg-gray-200 px-3 py-1 rounded">g</strong> キー</p>
                    </div>
                    <p class="text-gray-600 mt-4 text-lg">準備ができたら <strong class="bg-gray-200 px-3 py-1 rounded text-black">スペースキー</strong> を押して実験を開始します。</p>
                </div>
            `,
            choices: [' ']
        };
        timeline.push(instructions);

        const base_stimuli = [
            { word: "赤", color: "red", condition: "congruent", correct_response: 'r' },
            { word: "青", color: "blue", condition: "congruent", correct_response: 'b' },
            { word: "緑", color: "green", condition: "congruent", correct_response: 'g' },
            { word: "赤", color: "blue", condition: "incongruent", correct_response: 'b' },
            { word: "赤", color: "green", condition: "incongruent", correct_response: 'g' },
            { word: "青", color: "red", condition: "incongruent", correct_response: 'r' },
            { word: "青", color: "green", condition: "incongruent", correct_response: 'g' },
            { word: "緑", color: "red", condition: "incongruent", correct_response: 'r' },
            { word: "緑", color: "blue", condition: "incongruent", correct_response: 'b' }
        ];

        // 10試行分をサンプリング（元の仕様通り）
        const test_stimuli = jsPsych.randomization.sampleWithReplacement(base_stimuli, 10);

        const fixation = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: '<div class="fixation">+</div>',
            choices: "NO_KEYS",
            trial_duration: 500, // 注視点 500ms
            data: { task: 'fixation' }
        };

        const stroop_trial = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: function() {
                const word = jsPsych.timelineVariable('word');
                const color = jsPsych.timelineVariable('color');
                return `<div class="stimulus" style="color: ${color};">${word}</div>`;
            },
            choices: ['r', 'b', 'g'],
            post_trial_gap: 1000, // ITI 1000ms
            data: {
                task: 'stroop', // このタスク名で後でデータをフィルタリングします
                word: jsPsych.timelineVariable('word'),
                color: jsPsych.timelineVariable('color'),
                condition: jsPsych.timelineVariable('condition'),
                correct_response: jsPsych.timelineVariable('correct_response')
            },
            on_finish: function(data) {
                // 正誤判定：一致していれば "true"、間違っていれば "false" という【文字列】にする（空欄を防ぐため）
                const isCorrect = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
                data.correct = isCorrect ? "true" : "false";
            }
        };

        const test_procedure = {
            timeline: [fixation, stroop_trial],
            timeline_variables: test_stimuli
        };
        timeline.push(test_procedure);

        // ご指定の最新GAS URL
        const gasUrl = 'https://script.google.com/macros/s/AKfycbxVqMYpRdKYt0KoPwCvzIellFVKQmg3cAEJpMHNdzZ8PT_TogGZ8HEx5vIEkExpOidZTA/exec';
        // --- 5. 終了画面（同一画面にCSVを表示 & GAS自動送信） ---
        const final_screen = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `
                <div class="flex flex-col items-center justify-center space-y-6 max-w-2xl mx-auto p-8">
                    <h2 class="text-3xl font-bold text-gray-800">実験終了</h2>
                    <p class="text-lg text-gray-600">データを保存しています。このままブラウザを閉じずにお待ちください...</p>
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
                </div>
            `,
            choices: "NO_KEYS",
            on_load: function() {
                // 1. データの抽出（'stroop' タスクのみ抽出し、不要な列を削除）
                // 先に .values() で標準の配列にしてから .map() を行います
                const extracted = jsPsych.data.get().filter({task: 'stroop'}).values().map(function(data){
                    return {
                        subject_id: data.subject_id,
                        timestamp: data.timestamp,
                        word: data.word,
                        color: data.color,
                        condition: data.condition,
                        rt: Math.round(data.rt), // ミリ秒を整数に丸める
                        correct: data.correct
                    };
                });

                // GASに送信するデータ構造
                const payload = {
                    subject_id: subject_id,
                    jsonData: extracted
                };

                // 送信処理（fetch）
                sendToGAS(payload);
            }
        };
        timeline.push(final_screen);

        async function sendToGAS(payload) {
            const displayElement = jsPsych.getDisplayElement();
            let success = false;
            let attempt = 0;
            const maxAttempts = 3;

            while (!success && attempt < maxAttempts) {
                attempt++;
                try {
                    // サンドボックス環境（iframe）からのCORSエラーを回避するため、mode: 'no-cors' を指定して送信
                    const response = await fetch(gasUrl, {
                        method: 'POST',
                        mode: 'no-cors', // これによりサンドボックス環境からの送信エラー（Failed to fetch）を回避します
                        headers: {
                            'Content-Type': 'text/plain',
                        },
                        body: JSON.stringify(payload)
                    });

                    // no-cors の場合、レスポンスの中身はブラウザ制限により不透明（Opaque）になりますが、
                    // エラーを吐かずにここまで到達すれば、Googleのサーバーにデータは正常に到達・処理されています。
                    success = true;
                    displayElement.innerHTML = `
                        <div class="flex flex-col items-center justify-center space-y-6 max-w-2xl mx-auto p-8 bg-white rounded-xl shadow border border-green-200 mt-10">
                            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center">
                                <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            <h2 class="text-3xl font-bold text-gray-800">送信完了</h2>
                            <p class="text-lg text-gray-600">ご協力ありがとうございました。<br>データがスプレッドシートに記録されました。</p>
                            <p class="text-gray-400 text-sm mt-2">（ブラウザを閉じて終了してください）</p>
                        </div>
                    `;

                } catch (error) {
                    console.error('送信エラー (Attempt ' + attempt + '):', error);
                    if (attempt >= maxAttempts) {
                        // エラー時の表示
                        displayElement.innerHTML = `
                            <div class="flex flex-col items-center max-w-3xl mx-auto p-8 bg-white rounded-xl shadow border border-red-200 mt-10">
                                <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mb-4">
                                    <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                </div>
                                <h2 class="text-2xl font-bold text-gray-800 mb-2">通信エラーが発生しました</h2>
                                <p class="text-gray-600 mb-6">ネットワーク接続またはGASの設定に問題がある可能性があります。</p>
                                
                                <div class="w-full bg-gray-50 p-6 rounded-lg border border-gray-200 text-left">
                                    <h3 class="font-bold text-lg mb-2">💡 スプレッドシートに届かない場合の確認事項</h3>
                                    <ol class="list-decimal pl-5 space-y-2 text-sm text-gray-700">
                                        <li>GASの「デプロイ」設定で、「アクセスできるユーザー」が<strong>「全員」</strong>になっているか確認してください。</li>
                                        <li>GASのコードでスプレッドシートのIDが正しく指定されているか確認してください。</li>
                                    </ol>
                                    <div class="mt-4">
                                        <p class="font-bold text-gray-800 mb-1">■ 確実なGAS側のコード例（そのままコピーして使えます）:</p>
                                        <pre class="bg-gray-800 text-gray-100 p-4 rounded-lg text-xs overflow-x-auto select-all">
function doPost(e) {
  try {
    const json = JSON.parse(e.postData.contents);
    // スプレッドシートIDを開く
    const ss = SpreadsheetApp.openById('1b8jWS0lkSRgSlhJu17_T7oLbMs7Uyjk2KJkgLKifg9A');
    let sheet = ss.getSheets()[0];
    
    if (sheet.getLastRow() === 0) {
      sheet.appendRow(['subject_id', 'timestamp', 'word', 'color', 'condition', 'rt', 'correct']);
    }
    
    json.jsonData.forEach(function(trial) {
      sheet.appendRow([trial.subject_id, trial.timestamp, trial.word, trial.color, trial.condition, trial.rt, trial.correct]);
    });
    
    return ContentService.createTextOutput(JSON.stringify({ status: 'success' })).setMimeType(ContentService.MimeType.JSON).setHeader('Access-Control-Allow-Origin', '*');
  } catch (error) {
    return ContentService.createTextOutput(JSON.stringify({ status: 'error', message: error.toString() })).setMimeType(ContentService.MimeType.JSON).setHeader('Access-Control-Allow-Origin', '*');
  }
}</pre>
                                    </div>
                                </div>
                            </div>
                        `;
                    } else {
                        // 次の再試行まで待機
                        await new Promise(resolve => setTimeout(resolve, 2000));
                    }
                }
            }
        }

        jsPsych.run(timeline);
    </script>
</body>
</html>
