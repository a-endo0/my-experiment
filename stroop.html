<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroop Task</title>
    
    <!-- jsPsych コアライブラリの読み込み -->
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    
    <!-- 使用するプラグインの読み込み -->
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
    
    <!-- jsPsych の基本スタイルシート -->
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />

    <!-- カスタムCSS（デザイン要件の適用） -->
    <style>
        /* 背景色とフォントの設定 */
        body, .jspsych-display-element {
            background-color: #FFFFFF;
            font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            color: #000000;
        }
        
        /* 教示テキストのスタイル */
        .instruction {
            font-size: 24px;
            line-height: 1.8;
            text-align: center;
        }
        
        /* 色見本用の四角形のスタイル */
        .color-box {
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-right: 10px;
            vertical-align: middle;
            border: 1px solid #000;
        }
        
        /* 刺激（ストループ文字）のスタイル */
        .stimulus {
            font-size: 60px;
            font-weight: bold;
        }
        
        /* 注視点のスタイル */
        .fixation {
            font-size: 60px;
        }

        /* 終了画面のスタイル */
        .finish-container {
            padding: 20px;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .finish-message {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        /* CSVデータ表示エリアのスタイル */
        .csv-display {
            text-align: left;
            background-color: #f4f4f4;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <script>
        // --- 1. jsPsych の初期化 ---
        const jsPsych = initJsPsych();

        // タイムライン（実験の流れ）を格納する配列
        const timeline = [];

        // --- 2. 教示画面 ---
        const instructions = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `
                <div class="instruction">
                    <p>文字の<strong>『色』</strong>をキーボードで答えてください。</p>
                    <div style="text-align: left; display: inline-block; margin-bottom: 20px;">
                        <p><span class="color-box" style="background-color: red;"></span>赤色なら <strong>'r'</strong></p>
                        <p><span class="color-box" style="background-color: blue;"></span>青色なら <strong>'b'</strong></p>
                        <p><span class="color-box" style="background-color: green;"></span>緑色なら <strong>'g'</strong></p>
                    </div>
                    <p>スペースキーを押すと実験が開始されます。</p>
                </div>
            `,
            choices: [' ']
        };
        timeline.push(instructions);

        // --- 3. 刺激の準備（要因計画） ---
        const base_stimuli = [
            { word: "赤", color: "red", condition: "congruent", correct_response: 'r' },
            { word: "青", color: "blue", condition: "congruent", correct_response: 'b' },
            { word: "緑", color: "green", condition: "congruent", correct_response: 'g' },
            { word: "赤", color: "blue", condition: "incongruent", correct_response: 'b' },
            { word: "赤", color: "green", condition: "incongruent", correct_response: 'g' },
            { word: "青", color: "red", condition: "incongruent", correct_response: 'r' },
            { word: "青", color: "green", condition: "incongruent", correct_response: 'g' },
            { word: "緑", color: "red", condition: "incongruent", correct_response: 'r' },
            { word: "緑", color: "blue", condition: "incongruent", correct_response: 'b' }
        ];

        const test_stimuli = jsPsych.randomization.sampleWithReplacement(base_stimuli, 10);

        // --- 4. メイン試行ループの構築 ---
        const fixation = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: '<div class="fixation">+</div>',
            choices: "NO_KEYS",
            trial_duration: 500
        };

        const stroop_trial = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: function() {
                const word = jsPsych.timelineVariable('word');
                const color = jsPsych.timelineVariable('color');
                return `<div class="stimulus" style="color: ${color};">${word}</div>`;
            },
            choices: ['r', 'b', 'g'],
            post_trial_gap: 1000,
            data: {
                task: 'stroop',
                word: jsPsych.timelineVariable('word'),
                color: jsPsych.timelineVariable('color'),
                condition: jsPsych.timelineVariable('condition'),
                correct_response: jsPsych.timelineVariable('correct_response')
            },
            on_finish: function(data) {
                data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
            }
        };

        const test_procedure = {
            timeline: [fixation, stroop_trial],
            timeline_variables: test_stimuli
        };
        timeline.push(test_procedure);

        // --- 5. 終了画面（同一画面にCSVを表示） ---
        const final_screen = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: function() {
                // 保存されたすべてのデータをCSV形式で取得
                const csv_data = jsPsych.data.get().csv();
                return `
                    <div class="finish-container">
                        <div class="finish-message">実験終了</div>
                        <p>測定が完了しました。データは以下の通りです。</p>
                        <div class="csv-display">${csv_data}</div>
                        <p style="margin-top: 20px; font-size: 14px; color: #666;">
                            ブラウザを閉じて終了してください。
                        </p>
                    </div>
                `;
            },
            choices: "NO_KEYS" // キー入力を無効にして終了状態で固定
        };
        timeline.push(final_screen);

        // --- 6. 実行 ---
        jsPsych.run(timeline);
    </script>
</body>
</html>
