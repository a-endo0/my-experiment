<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>jsPsych Red Circle Task</title>
  
  <!-- jsPsychコアライブラリ (v7系) -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <!-- html-keyboard-response プラグイン -->
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <!-- jsPsych スタイルシート -->
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
  
  <style>
    /* 1. 背景色を灰色 (#808080) に設定 */
    body {
      background-color: #808080;
      color: #ffffff; /* 灰色背景上でテキストが見やすいように文字色を白に設定 */
      margin: 0;
      padding: 0;
    }

    /* 2. 直径100pxの赤い円のCSSクラス */
    .red-circle {
      width: 100px;
      height: 100px;
      background-color: red;
      border-radius: 50%; /* 正方形を円形にする */
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <script>
    // jsPsychの初期化
    const jsPsych = initJsPsych();

    // 実験のタイムラインを格納する配列
    const timeline = [];

    // 2. & 3. 赤い円を表示し、スペースキーを待つトライアル
    const circle_trial = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<div class="red-circle"></div>', // DIVタグで円を描画
      choices: [' '], // 反応キーをスペースキーのみに制限
    };
    timeline.push(circle_trial);

    // 4. 終了メッセージを表示するトライアル
    const end_trial = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <h2>終了しました</h2>
        <p>ご参加ありがとうございました。</p>
        <p style="font-size: 0.8em; color: #cccccc;">(何かキーを押すと終了します)</p>
      `
    };
    timeline.push(end_trial);

    // タイムラインの実行
    jsPsych.run(timeline);
  </script>
</body>
</html>
