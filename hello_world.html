<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理学実験室</title>
    <!-- Tailwind CSSを使用してスタイリングを効率化 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 追加のカスタムスタイルが必要な場合はここに記述しますが、今回はTailwindのクラスで完結させます */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <!-- メインコンテンツ -->
    <main class="text-center">
        <h1 class="text-3xl md:text-5xl font-bold text-gray-800 mb-8 tracking-wide">
            心理学実験室へようこそ
        </h1>
        
        <button 
            id="startButton"
            class="bg-blue-600 hover:bg-blue-700 text-white text-lg font-semibold py-3 px-8 rounded-full shadow-lg transition-all duration-300 transform hover:scale-105 focus:outline-none focus:ring-4 focus:ring-blue-300"
        >
            実験を開始する
        </button>
    </main>

    <!-- カスタムメッセージボックス (非表示状態からスタート) -->
    <div id="messageBox" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 transition-opacity duration-300 opacity-0">
        <div class="bg-white rounded-xl shadow-2xl p-8 max-w-sm w-full mx-4 transform scale-95 transition-transform duration-300" id="messageBoxContent">
            <h2 class="text-2xl font-bold text-gray-800 mb-4 text-center">メッセージ</h2>
            <p class="text-gray-600 text-lg mb-6 text-center">
                Hello World!
            </p>
            <div class="flex justify-center">
                <button 
                    id="closeButton"
                    class="bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-6 rounded-lg transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-gray-400"
                >
                    閉じる
                </button>
            </div>
        </div>
    </div>

    <!-- JavaScriptのロジック -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const startButton = document.getElementById('startButton');
            const messageBox = document.getElementById('messageBox');
            const messageBoxContent = document.getElementById('messageBoxContent');
            const closeButton = document.getElementById('closeButton');

            // メッセージボックスを表示する関数
            const showMessage = () => {
                // display: hidden を外す
                messageBox.classList.remove('hidden');
                // 少し遅延させてから透明度とスケールを変更してアニメーションさせる
                requestAnimationFrame(() => {
                    messageBox.classList.remove('opacity-0');
                    messageBoxContent.classList.remove('scale-95');
                    messageBoxContent.classList.add('scale-100');
                });
            };

            // メッセージボックスを非表示にする関数
            const hideMessage = () => {
                messageBox.classList.add('opacity-0');
                messageBoxContent.classList.remove('scale-100');
                messageBoxContent.classList.add('scale-95');
                
                // アニメーション完了後に hidden を追加
                setTimeout(() => {
                    messageBox.classList.add('hidden');
                }, 300); // duration-300 と同じ時間に設定
            };

            // 「実験を開始する」ボタンのクリックイベント
            startButton.addEventListener('click', showMessage);

            // 「閉じる」ボタンのクリックイベント
            closeButton.addEventListener('click', hideMessage);

            // 背景（黒い半透明の部分）をクリックしても閉じられるようにする
            messageBox.addEventListener('click', (e) => {
                if (e.target === messageBox) {
                    hideMessage();
                }
            });
        });
    </script>
</body>
</html>
